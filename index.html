<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Long Room — Trinity College Dublin</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, Segoe UI, sans-serif; touch-action: none; }
  #app { position: fixed; inset: 0; }
  #overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65); color: #fff; z-index: 10; cursor: pointer;
    text-align: center; flex-direction: column; gap: 12px; padding: 20px;
  }
  #overlay h2 { font-weight: 600; font-size: 26px; margin: 0; letter-spacing: 0.5px; }
  #overlay p { margin: 0; font-size: 15px; opacity: 0.85; max-width: 520px; line-height: 1.5; }
  #overlay .cta { margin-top: 6px; font-size: 13px; opacity: 0.6; }
  #overlay.hidden { display: none; }
  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px; border-radius: 50%; background: rgba(255,255,255,0.8);
    z-index: 5; pointer-events: none;
  }
  #crosshair.hidden { display: none; }
  #hint, #subtitle {
    position: fixed; left: 50%; transform: translateX(-50%);
    color: #fff; background: rgba(0,0,0,0.55); padding: 8px 16px;
    border-radius: 8px; font-size: 16px; z-index: 5; max-width: 84%;
    text-align: center; pointer-events: none; box-sizing: border-box;
  }
  #hint { bottom: 84px; }
  #subtitle { bottom: 84px; display: none; line-height: 1.5; }
  #subtitle.show { display: block; }
  /* 手机：左侧虚拟摇杆 + 右侧“listen”按钮 */
  #joystick {
    position: fixed; left: 26px; bottom: 26px; width: 120px; height: 120px;
    border-radius: 50%; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.25);
    z-index: 6; display: none; touch-action: none;
  }
  #joystick.show { display: block; }
  #stick {
    position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; margin: -26px;
    border-radius: 50%; background: rgba(255,255,255,0.35);
  }
  #listenBtn {
    position: fixed; right: 26px; bottom: 50px; z-index: 7;
    padding: 14px 22px; border-radius: 30px; border: none;
    background: rgba(255,208,96,0.92); color: #2a1c00; font-size: 16px; font-weight: 600;
    display: none; box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  #listenBtn.show { display: block; }
</style>
</head>
<body>
<div id="app"></div>
<div id="crosshair" class="hidden"></div>
<div id="hint"></div>
<div id="subtitle"></div>
<div id="joystick"><div id="stick"></div></div>
<button id="listenBtn">Listen</button>
<div id="overlay">
  <h2>The Long Room</h2>
  <p>Old Library, Trinity College Dublin — an immersive walkthrough with spatial audio.</p>
  <p id="controlsHelp"></p>
  <p class="cta" id="ctaText">Click to enter</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://cdn.jsdelivr.net/npm/@sparkjsdev/spark@2.1.0/dist/spark.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

// ===================== 可调常量 =====================
const SPLAT_URL = "long-room.spz";
const START_POS = new THREE.Vector3(0.04, 1.20, 1.64);  // 出生点
const LOOK_AT  = new THREE.Vector3(0.07, 1.26, 0.64);   // 初始朝向
const MOVE_SPEED = 2.2;
const IR_URL = "ir.wav";

// 活动范围限制（避免走到 Marble 失真区）。x/z 方框边界，y 固定。
let BOUNDS = { xMin: -1.97, xMax: 1.84, zMin: -12.59, zMax: 7.67 }; // 用户记录的活动范围

// 两个交互热点
const HOTSPOTS = [
  {
    name: "Book of Kells",
    pos: new THREE.Vector3(-1.04, 0.45, -3.99),
    audio: "narration.wav",
    range: 2.5,
    script: [
      { text: "Welcome to the Long Room of the Old Library at Trinity College Dublin.", weight: 1.0 },
      { text: "Built between 1712 and 1732, this hall is nearly 65 metres long, and houses around 200,000 of the library's oldest books.", weight: 1.9 },
      { text: "At its heart lies the Book of Kells — a lavishly illuminated manuscript of the four Gospels, created by monks around the year 800.", weight: 1.9 },
      { text: "It is regarded as one of Ireland's greatest cultural treasures, and a masterpiece of insular illumination.", weight: 1.4 },
    ],
  },
];

// ===================== 设备检测 =====================
const isTouch = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;

// ===================== 场景基础 =====================
const app = document.getElementById("app");
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const spark = new SparkRenderer({ renderer });
scene.add(spark);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.copy(START_POS);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===================== 加载高斯泼溅 =====================
const longRoom = new SplatMesh({ url: SPLAT_URL });
scene.add(longRoom);

// ===================== 相机朝向：统一 yaw/pitch 模型 =====================
let yaw = 0, pitch = 0;
const PITCH_LIMIT = Math.PI / 2 - 0.05;
(function initLook() {
  const d = LOOK_AT.clone().sub(START_POS).normalize();
  yaw = Math.atan2(-d.x, -d.z);
  pitch = Math.asin(THREE.MathUtils.clamp(d.y, -1, 1));
})();
const _euler = new THREE.Euler(0, 0, 0, "YXZ");
function applyLook() {
  _euler.set(pitch, yaw, 0);
  camera.quaternion.setFromEuler(_euler);
}
applyLook();

// ===================== 输入：移动向量 + 视角增量 =====================
// moveInput: z 正=前进，x 正=右；键盘和摇杆都写入它
const keyMove = { f: 0, b: 0, l: 0, r: 0 };
const joyMove = { x: 0, z: 0 };
let started = false;

const overlay = document.getElementById("overlay");
const crosshair = document.getElementById("crosshair");
const joystickEl = document.getElementById("joystick");
const stickEl = document.getElementById("stick");
const listenBtn = document.getElementById("listenBtn");
const hint = document.getElementById("hint");
const subtitle = document.getElementById("subtitle");

// 进入提示文案
document.getElementById("controlsHelp").textContent = isTouch
  ? "Left side to move · Right side to look · Tap a glowing point to listen"
  : "WASD to move · Mouse to look · Walk up to a glowing point and press E";
document.getElementById("ctaText").textContent = isTouch ? "Tap to enter" : "Click to enter";

function enter() {
  if (started) return;
  started = true;
  overlay.classList.add("hidden");
  initAudio();
  if (isTouch) {
    joystickEl.classList.add("show");
  } else {
    crosshair.classList.remove("hidden");
    renderer.domElement.requestPointerLock();
  }
}
overlay.addEventListener("click", enter);

// ---- 桌面：键盘移动 ----
document.addEventListener("keydown", (e) => {
  switch (e.code) {
    case "KeyW": keyMove.f = 1; break;
    case "KeyS": keyMove.b = 1; break;
    case "KeyA": keyMove.l = 1; break;
    case "KeyD": keyMove.r = 1; break;
    case "KeyE": triggerNearest(); break;
    case "KeyB": recordBound(); break;   // 记录活动边界角点
    case "KeyN": boundPts = []; coordEl.textContent = "bounds reset"; break; // 清空重记
    case "KeyO": recordSpawn(); break;
  }
});
document.addEventListener("keyup", (e) => {
  switch (e.code) {
    case "KeyW": keyMove.f = 0; break;
    case "KeyS": keyMove.b = 0; break;
    case "KeyA": keyMove.l = 0; break;
    case "KeyD": keyMove.r = 0; break;
  }
});

// ---- 桌面：鼠标看视角（pointer lock）----
const LOOK_SENS = 0.0022;
document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement !== renderer.domElement) return;
  yaw -= e.movementX * LOOK_SENS;
  pitch -= e.movementY * LOOK_SENS;
  pitch = THREE.MathUtils.clamp(pitch, -PITCH_LIMIT, PITCH_LIMIT);
});
document.addEventListener("pointerlockchange", () => {
  if (started && !isTouch && document.pointerLockElement !== renderer.domElement) {
    // 用户按 Esc 退出锁定 → 显示提示，可点击重新进入
    overlay.classList.remove("hidden");
    crosshair.classList.add("hidden");
    started = false;
  }
});

// ---- 手机：右半屏拖动看视角 ----
const TOUCH_LOOK_SENS = 0.005;
let lookTouchId = null, lookLastX = 0, lookLastY = 0;
// ---- 手机：左侧虚拟摇杆移动 ----
let joyTouchId = null, joyOriginX = 0, joyOriginY = 0;
const JOY_RADIUS = 50;

function onTouchStart(e) {
  if (!started) return;
  for (const t of e.changedTouches) {
    const inJoyArea = t.clientX < window.innerWidth * 0.45;
    if (inJoyArea && joyTouchId === null) {
      joyTouchId = t.identifier;
      joyOriginX = t.clientX; joyOriginY = t.clientY;
    } else if (!inJoyArea && lookTouchId === null) {
      lookTouchId = t.identifier;
      lookLastX = t.clientX; lookLastY = t.clientY;
    }
  }
}
function onTouchMove(e) {
  if (!started) return;
  for (const t of e.changedTouches) {
    if (t.identifier === joyTouchId) {
      let dx = t.clientX - joyOriginX;
      let dy = t.clientY - joyOriginY;
      const len = Math.hypot(dx, dy) || 1;
      const cl = Math.min(len, JOY_RADIUS);
      const nx = (dx / len) * cl, ny = (dy / len) * cl;
      stickEl.style.transform = `translate(${nx}px, ${ny}px)`;
      joyMove.x = nx / JOY_RADIUS;     // 右为正
      joyMove.z = -ny / JOY_RADIUS;    // 上为前进
    } else if (t.identifier === lookTouchId) {
      yaw -= (t.clientX - lookLastX) * TOUCH_LOOK_SENS;
      pitch -= (t.clientY - lookLastY) * TOUCH_LOOK_SENS;
      pitch = THREE.MathUtils.clamp(pitch, -PITCH_LIMIT, PITCH_LIMIT);
      lookLastX = t.clientX; lookLastY = t.clientY;
    }
  }
}
function onTouchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === joyTouchId) {
      joyTouchId = null; joyMove.x = 0; joyMove.z = 0;
      stickEl.style.transform = "translate(0,0)";
    } else if (t.identifier === lookTouchId) {
      lookTouchId = null;
    }
  }
}
window.addEventListener("touchstart", onTouchStart, { passive: false });
window.addEventListener("touchmove", onTouchMove, { passive: false });
window.addEventListener("touchend", onTouchEnd);
window.addEventListener("touchcancel", onTouchEnd);
listenBtn.addEventListener("click", triggerNearest);

// ===================== 移动 + 走路晃动 + 脚步 =====================
const forwardVec = new THREE.Vector3();
const rightVec = new THREE.Vector3();
let bobTime = 0, stepAccum = 0;
const BOB_FREQ = 9, BOB_AMP_Y = 0.016, BOB_AMP_X = 0.007;

function updateMovement(delta) {
  if (!started) return;
  applyLook();

  // 水平 forward / right（忽略 pitch）
  forwardVec.set(-Math.sin(yaw), 0, -Math.cos(yaw));
  rightVec.set(Math.cos(yaw), 0, -Math.sin(yaw));

  // 合并键盘与摇杆输入
  let mz = (keyMove.f - keyMove.b) + joyMove.z;
  let mx = (keyMove.r - keyMove.l) + joyMove.x;
  mz = THREE.MathUtils.clamp(mz, -1, 1);
  mx = THREE.MathUtils.clamp(mx, -1, 1);

  const step = MOVE_SPEED * delta;
  camera.position.addScaledVector(forwardVec, mz * step);
  camera.position.addScaledVector(rightVec, mx * step);

  const moving = Math.abs(mz) > 0.01 || Math.abs(mx) > 0.01;
  if (moving) {
    bobTime += delta * BOB_FREQ;
    camera.position.y = START_POS.y + Math.sin(bobTime * 2) * BOB_AMP_Y;
    camera.position.addScaledVector(rightVec, Math.cos(bobTime) * BOB_AMP_X);
    stepAccum += delta * BOB_FREQ;
    if (stepAccum > Math.PI) { stepAccum -= Math.PI; playFootstep(); }
  } else {
    bobTime = 0; stepAccum = 0;
    camera.position.y += (START_POS.y - camera.position.y) * Math.min(1, delta * 8);
  }

  // 活动范围限制
  camera.position.x = THREE.MathUtils.clamp(camera.position.x, BOUNDS.xMin, BOUNDS.xMax);
  camera.position.z = THREE.MathUtils.clamp(camera.position.z, BOUNDS.zMin, BOUNDS.zMax);
}

// ===================== 热点（金点 + 光晕）=====================
function makeGlowTexture() {
  const size = 128;
  const cv = document.createElement("canvas");
  cv.width = cv.height = size;
  const g = cv.getContext("2d");
  const grd = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grd.addColorStop(0.0, "rgba(255,224,140,1.0)");
  grd.addColorStop(0.3, "rgba(255,208,96,0.6)");
  grd.addColorStop(1.0, "rgba(255,208,96,0.0)");
  g.fillStyle = grd; g.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const glowTex = makeGlowTexture();

function buildHotspot(hs) {
  const geo = new THREE.SphereGeometry(0.07, 20, 20);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffe08a });
  mat.depthTest = false;
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(hs.pos);
  mesh.renderOrder = 999;
  const glowMat = new THREE.SpriteMaterial({
    map: glowTex, transparent: true, opacity: 0.9,
    depthTest: false, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const glow = new THREE.Sprite(glowMat);
  glow.scale.setScalar(0.55);
  glow.renderOrder = 998;
  mesh.add(glow);
  scene.add(mesh);
  hs.mesh = mesh;
}
HOTSPOTS.forEach(buildHotspot);

let hotspotPulse = 0;
let narrationPlaying = false;
let nearestHotspot = null;

// ===================== 字幕 =====================
let subtitleTimers = [];
function clearSubtitleTimers() { subtitleTimers.forEach(clearTimeout); subtitleTimers = []; }
function startSubtitleTimeline(script, durationSec) {
  clearSubtitleTimers();
  const totalWeight = script.reduce((s, l) => s + l.weight, 0);
  let elapsed = 0;
  script.forEach((line) => {
    const at = elapsed;
    subtitleTimers.push(setTimeout(() => {
      subtitle.textContent = line.text;
      subtitle.classList.add("show");
    }, at * 1000));
    elapsed += (line.weight / totalWeight) * durationSec;
  });
  subtitleTimers.push(setTimeout(() => {
    subtitle.classList.remove("show");
    narrationPlaying = false;
  }, durationSec * 1000 + 400));
}

function triggerNearest() {
  if (narrationPlaying || !nearestHotspot) return;
  narrationPlaying = true;
  playNarration(nearestHotspot);
}

// ===================== 音频 =====================
let listener, convolver;
let audioReady = false;

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  listener = new THREE.AudioListener();
  camera.add(listener);
  const ctx = listener.context;
  if (ctx.state === "suspended") ctx.resume();

  convolver = ctx.createConvolver();
  loadOrGenerateIR(ctx).then((buf) => {
    convolver.buffer = buf;
    convolver.connect(ctx.destination);
  });

  // 每个热点一个空间定位音源，经过混响
  HOTSPOTS.forEach((hs) => {
    const src = new THREE.PositionalAudio(listener);
    src.setRefDistance(3);
    src.setRolloffFactor(1.0);
    src.setDistanceModel("inverse");
    hs.mesh.add(src);
    hs.narrationSource = src;
  });
}

function playNarration(hs) {
  initAudio();
  const ctx = listener.context;
  fetch(hs.audio)
    .then((r) => { if (!r.ok) throw new Error("no narration"); return r.arrayBuffer(); })
    .then((data) => ctx.decodeAudioData(data))
    .then((buf) => {
      const src = hs.narrationSource;
      if (src.isPlaying) src.stop();
      src.setBuffer(buf);
      src.setVolume(1.0);
      src.getOutput().disconnect();
      src.getOutput().connect(convolver);
      convolver.connect(ctx.destination);
      src.play();
      startSubtitleTimeline(hs.script, buf.duration);
    })
    .catch(() => {
      playPlaceholderChime(ctx);
      startSubtitleTimeline(hs.script, 8);
    });
}

function playFootstep() {
  if (!audioReady || !convolver || !listener) return;
  const ctx = listener.context;
  const dur = 0.11;
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / d.length;
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 4);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = 380 + Math.random() * 120;
  const g = ctx.createGain(); g.gain.value = 0.20 + Math.random() * 0.06;
  src.connect(lp); lp.connect(g);
  g.connect(convolver); convolver.connect(ctx.destination);
  g.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + dur);
}

function playPlaceholderChime(ctx) {
  const now = ctx.currentTime;
  const notes = [392.0, 493.88, 587.33, 783.99];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "triangle"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now + i * 0.18);
    gain.gain.linearRampToValueAtTime(0.25, now + i * 0.18 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 1.6);
    osc.connect(gain);
    gain.connect(convolver); convolver.connect(ctx.destination);
    osc.start(now + i * 0.18); osc.stop(now + i * 0.18 + 1.7);
  });
}

function loadOrGenerateIR(ctx) {
  return fetch(IR_URL)
    .then((r) => { if (!r.ok) throw new Error("no ir"); return r.arrayBuffer(); })
    .then((data) => ctx.decodeAudioData(data))
    .catch(() => generateSyntheticIR(ctx, 3.2));
}
function generateSyntheticIR(ctx, durationSec) {
  const length = Math.floor(ctx.sampleRate * durationSec);
  const buffer = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const t = i / length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.5);
    }
  }
  return buffer;
}

// ===================== 临时定位工具（仅键盘，发布隐藏屏显）=====================
const coordEl = document.createElement("div");
coordEl.style.cssText = "position:fixed;top:10px;left:10px;color:#0f0;font:13px monospace;background:rgba(0,0,0,0.6);padding:6px 10px;z-index:30;white-space:pre;";
const SHOW_TOOLS = false; // 调试边界时显示；调好后改回 false
if (SHOW_TOOLS) { document.body.appendChild(coordEl); coordEl.textContent = "走到活动区边角，按 B 记录；N 清空"; }
let boundPts = [];
function recordBound() {
  boundPts.push([camera.position.x, camera.position.z]);
  const xs = boundPts.map((p) => p[0]), zs = boundPts.map((p) => p[1]);
  coordEl.textContent =
    "BOUNDS  (pts: " + boundPts.length + ")\n" +
    "xMin: " + Math.min(...xs).toFixed(2) + "  xMax: " + Math.max(...xs).toFixed(2) + "\n" +
    "zMin: " + Math.min(...zs).toFixed(2) + "  zMax: " + Math.max(...zs).toFixed(2);
}
function recordSpawn() {
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  const p = camera.position, look = p.clone().add(dir);
  coordEl.textContent =
    "START_POS = (" + p.x.toFixed(2) + ", " + p.y.toFixed(2) + ", " + p.z.toFixed(2) + ")\n" +
    "LOOK_AT  = (" + look.x.toFixed(2) + ", " + look.y.toFixed(2) + ", " + look.z.toFixed(2) + ")";
}

// ===================== 主循环 =====================
const clock = new THREE.Clock();
const listenText = isTouch ? "Tap “Listen”" : "Press E to listen";
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);
  updateMovement(delta);

  hotspotPulse += delta;
  const s = 1 + 0.15 * Math.sin(hotspotPulse * 3);

  // 找最近的、在范围内的热点
  nearestHotspot = null;
  let bestDist = Infinity;
  for (const hs of HOTSPOTS) {
    hs.mesh.scale.setScalar(s);
    const d = camera.position.distanceTo(hs.pos);
    if (d < hs.range && d < bestDist) { bestDist = d; nearestHotspot = hs; }
  }

  if (started && nearestHotspot && !narrationPlaying) {
    hint.textContent = listenText + " · " + nearestHotspot.name;
    if (isTouch) listenBtn.classList.add("show");
  } else {
    hint.textContent = "";
    listenBtn.classList.remove("show");
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
